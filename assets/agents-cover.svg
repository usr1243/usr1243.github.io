<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#dbe4ff"/>
    </linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#2b4acc" stroke-width="1.6"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2b4acc" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <text x="60" y="70" font-size="24" font-weight="700" fill="#2b4acc" letter-spacing="2">MULTI-AGENT ORCHESTRATION</text>

  <!-- connectors -->
  <g stroke="#2b4acc" stroke-width="2.5" fill="none" marker-end="url(#ar)" opacity="0.8">
    <path d="M300,300 C360,300 360,175 430,175"/>
    <path d="M300,300 L430,300"/>
    <path d="M300,300 C360,300 360,425 430,425"/>
    <path d="M770,175 C840,175 840,300 900,300"/>
    <path d="M770,300 L900,300"/>
    <path d="M770,425 C840,425 840,300 900,300"/>
  </g>

  <!-- Orchestrator -->
  <g filter="url(#sh)">
    <rect x="90" y="255" width="210" height="90" rx="16" fill="#2b4acc"/>
  </g>
  <text x="195" y="298" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">Orchestrator</text>
  <text x="195" y="323" text-anchor="middle" font-size="15" fill="#c9d4ff">liest &amp; verteilt</text>

  <!-- Sub-agents -->
  <g filter="url(#sh)">
    <rect x="430" y="135" width="340" height="80" rx="14" fill="#fff" stroke="#c3cffb"/>
    <rect x="430" y="260" width="340" height="80" rx="14" fill="#fff" stroke="#c3cffb"/>
    <rect x="430" y="385" width="340" height="80" rx="14" fill="#fff" stroke="#c3cffb"/>
  </g>
  <g font-size="20" font-weight="650" fill="#1e2a5a">
    <text x="460" y="182">🤖 Sub-Agent · Angebote</text>
    <text x="460" y="307">🗓️ Sub-Agent · Termine</text>
    <text x="460" y="432">💬 Sub-Agent · Nachfass</text>
  </g>
  <g font-size="13" fill="#7b86b8">
    <text x="460" y="200">lädt nur eigenes Wissen · parallel</text>
    <text x="460" y="325">lädt nur eigenes Wissen · parallel</text>
    <text x="460" y="450">lädt nur eigenes Wissen · parallel</text>
  </g>

  <!-- Result -->
  <g filter="url(#sh)">
    <rect x="900" y="255" width="210" height="90" rx="16" fill="#fff" stroke="#c3cffb"/>
  </g>
  <text x="1005" y="298" text-anchor="middle" font-size="23" font-weight="700" fill="#1e2a5a">Ergebnis</text>
  <text x="1005" y="323" text-anchor="middle" font-size="15" fill="#7b86b8">zusammengeführt</text>
</svg>
